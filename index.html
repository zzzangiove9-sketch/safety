const kstNow = () => new Date(new Date().getTime() + 9*60*60*1000);
const todayKST = () => kstNow().toISOString().slice(0,10);
const kstTimeStr = () => {
  const k=kstNow(), h=k.getUTCHours(), m=String(k.getUTCMinutes()).padStart(2,"0");
  return `${h<12?"오전":"오후"} ${h%12||12}:${m}`;
};
const getDayOfYear = () => {
  const k=kstNow();
  return Math.floor((k-new Date(Date.UTC(k.getUTCFullYear(),0,1)))/86400000);
};
const fmtDateFull = key => {
  if(!key) return "";
  const [y,m,d]=key.split("-");
  return `${y}년 ${Number(m)}월 ${Number(d)}일`;
};
const p2 = n => String(n).padStart(2,"0");
const dateKey = d => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;

function CalendarPicker({value, onChange, onClose}) {
  const init = value ? new Date(value+"T00:00:00") : new Date();
  const [vy, setVy] = useState(init.getFullYear());
  const [vm, setVm] = useState(init.getMonth());
  const firstDay = new Date(vy,vm,1).getDay();
  const days = new Date(vy,vm+1,0).getDate();
  const cells = [...Array(firstDay).fill(null), ...Array.from({length:days},(_,i)=>i+1)];
  const pick = d => { if(!d) return; onChange(`${vy}-${p2(vm+1)}-${p2(d)}`); onClose(); };
  return (
    <div style={sx({position:"fixed",inset:0,background:"#000000aa",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"})} onClick={onClose}>
      <div style={sx({background:"#161b27",border:"1px solid #1e2535",borderRadius:16,padding:18,width:290})} onClick={e=>e.stopPropagation()}>
        <div style={sx({display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10})}>
          <button style={Sb.smallBtn} onClick={()=>vm===0?(setVm(11),setVy(y=>y-1)):setVm(m=>m-1)}>&#8249;</button>
          <span style={sx({fontSize:18,fontWeight:700,color:"#f0f4ff"})}>{vy}년 {vm+1}월</span>
          <button style={Sb.smallBtn} onClick={()=>vm===11?(setVm(0),setVy(y=>y+1)):setVm(m=>m+1)}>&#8250;</button>
        </div>
        <div style={sx({display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2})}>
          {["일","월","화","수","목","금","토"].map(d=><div key={d} style={sx({textAlign:"center",fontSize:14,color:"#6b7280",fontWeight:700,padding:"3px 0"})}>{d}</div>)}
          {cells.map((d,i)=>{
            const key=d?`${vy}-${p2(vm+1)}-${p2(d)}`:null;
            const isSel=key===value, isToday=key===todayKST();
            return <div key={i} style={sx({textAlign:"center",padding:"6px 2px",fontSize:16,borderRadius:5,cursor:d?"pointer":"default",color:!d?"transparent":isSel?"#fff":isToday?"#60a5fa":"#9ca3af",background:isSel?"#2563eb":isToday?"#1e3a5f":"transparent",fontWeight:(isSel||isToday)?700:400})} onClick={()=>pick(d)}>{d||""}</div>;
          })}
        </div>
        <button style={sx({...Sb.smallBtn,width:"100%",marginTop:10})} onClick={onClose}>닫기</button>
      </div>
    </div>
  );
}

function BarChart({data, maxVal=15}) {
  const max=Math.max(maxVal,...data.map(d=>d.val),1);
  return (
    <div style={sx({padding:"0 14px 14px"})}>
      {data.map(({label,val,color})=>(
        <div key={label} style={sx({marginBottom:9})}>
          <div style={sx({display:"flex",justifyContent:"space-between",marginBottom:3})}>
            <span style={sx({fontSize:15,color:"#9ca3af",fontWeight:600})}>{label}</span>
            <span style={sx({fontSize:15,color:"#60a5fa",fontWeight:700})}>{val}회</span>
          </div>
          <div style={sx({height:18,background:"#1e2535",borderRadius:4,overflow:"hidden"})}>
            <div style={sx({height:"100%",width:`${(val/max)*100}%`,background:color,borderRadius:4,transition:"width 0.6s",display:"flex",alignItems:"center",paddingLeft:5})}>
              {val>0&&<span style={sx({fontSize:14,color:"#fff",fontWeight:700})}>{val}</span>}

          </div>
        </div>
      ))}
    </div>
  );
}

function ExcelPage({allSubs, groupNames, adminTeam, isSuper, onBack}) {
  const gName = g => (groupNames && groupNames[g]) ? groupNames[g] : (g || "");
  const kNow = kstNow();
  const firstOfMonth = `${kNow.getUTCFullYear()}-${p2(kNow.getUTCMonth()+1)}-01`;
  const [startDate, setStartDate] = useState(firstOfMonth);
  const [endDate, setEndDate] = useState(todayKST());
  const [showStartCal, setShowStartCal] = useState(false);
  const [showEndCal, setShowEndCal] = useState(false);
  const [downloading, setDownloading] = useState(false);
  const countRows = () => {
    if(!startDate||!endDate||startDate>endDate) return 0;
    let cnt=0;
    const s=new Date(startDate+"T00:00:00"), e=new Date(endDate+"T00:00:00");
    for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
      const dk=dateKey(d);
      Object.values(allSubs[dk]||{}).forEach(sub=>{ if(isSuper||sub.team===adminTeam) cnt++; });
    }
    return cnt;
  };
  const handleDownload = () => {
    if(!startDate||!endDate) return alert("기간을 선택해주세요.");
    if(startDate>endDate) return alert("시작일이 종료일보다 늦을 수 없어요.");
    setDownloading(true);
    try {
      const rows=[];
      const s=new Date(startDate+"T00:00:00"), e=new Date(endDate+"T00:00:00");
      for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
        const dk=dateKey(d);
        Object.values(allSubs[dk]||{}).forEach(sub=>{
          if(!isSuper&&sub.team!==adminTeam) return;
          rows.push({
            "날짜": fmtDateFull(dk), "팀": sub.team||"", "조": gName(sub.group)||"", "진행자": sub.name||"", "제출시간": sub.time||"",
            "Q1.스트레칭": sub.answers?.[1]||"", "Q2.건강상태": sub.answers?.[2]||"", "Q3.비상대응안내": sub.answers?.[3]||"",
            "Q4.보호구확인": sub.answers?.[4]||"", "Q5.사고위험여부": sub.answers?.[5]||"", "Q5-1.위험내용": sub.answers?.["5-1"]||"",
          });
        });
      }
      if(rows.length===0){setDownloading(false);return alert("선택한 기간에 데이터가 없어요.");}
      const ws=XLSX.utils.json_to_sheet(rows);
      ws["!cols"]=[{wch:14},{wch:10},{wch:14},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12},{wch:10},{wch:12},{wch:30}];
      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,"TBM제출기록");
      XLSX.writeFile(wb,`TBM_${startDate}_${endDate}.xlsx`);
    } catch(e){alert("다운로드 실패: "+e.message);}
    setDownloading(false);
  };
  const quickSet = (s,e) => {setStartDate(s);setEndDate(e);};
  return (
    <div style={sx({paddingBottom:40})}>
      {showStartCal&&<CalendarPicker value={startDate} onChange={v=>{setStartDate(v);setShowStartCal(false);}} onClose={()=>setShowStartCal(false)}/>}
      {showEndCal&&<CalendarPicker value={endDate} onChange={v=>{setEndDate(v);setShowEndCal(false);}} onClose={()=>setShowEndCal(false)}/>}
      <div style={Sb.topBar}>
        <button style={Sb.backBtn} onClick={onBack}>← 뒤로</button>
        <span style={Sb.topTitle}>엑셀 다운로드</span>
      </div>
      <div style={sx({...Sb.card,background:"#0d2b1a",border:"1px solid #166534"})}>
        <p style={sx({fontSize:16,color:"#4ade80",fontWeight:700,marginBottom:4})}>📊 기간별 엑셀 다운로드</p>
        <p style={sx({fontSize:16,color:"#9ca3af",lineHeight:1.6})}>기간을 선택하면 TBM 제출 기록을 엑셀 파일(.xlsx)로 저장할 수 있어요.</p>
      </div>
      <div style={Sb.card}>
        <p style={sx({fontSize:17,fontWeight:700,color:"#f0f4ff",marginBottom:12})}>📅 기간 설정</p>
        <div style={sx({marginBottom:12})}>
          <p style={sx({fontSize:15,color:"#6b7280",marginBottom:6,fontWeight:600})}>시작일</p>
          <div style={sx({display:"flex",alignItems:"center",gap:8})}>
            <button style={sx({...Sb.smallBtn,padding:"9px 14px",background:"#1e3a5f",border:"1px solid #2563eb55",color:"#60a5fa"})} onClick={()=>setShowStartCal(true)}>📅 선택</button>
            <span style={sx({fontSize:18,fontWeight:700,color:"#f0f4ff"})}>{startDate?fmtDateFull(startDate):"날짜 선택"}</span>
          </div>
        </div>
        <div style={sx({marginBottom:14})}>
          <p style={sx({fontSize:15,color:"#6b7280",marginBottom:6,fontWeight:600})}>종료일</p>
          <div style={sx({display:"flex",alignItems:"center",gap:8})}>
            <button style={sx({...Sb.smallBtn,padding:"9px 14px",background:"#1e3a5f",border:"1px solid #2563eb55",color:"#60a5fa"})} onClick={()=>setShowEndCal(true)}>📅 선택</button>
            <span style={sx({fontSize:18,fontWeight:700,color:"#f0f4ff"})}>{endDate?fmtDateFull(endDate):"날짜 선택"}</span>
          </div>
        </div>
        <p style={sx({fontSize:15,color:"#6b7280",marginBottom:7,fontWeight:600})}>빠른 선택</p>
        <div style={sx({display:"flex",flexWrap:"wrap",gap:6})}>
          <button style={Sb.chip} onClick={()=>quickSet(todayKST(),todayKST())}>오늘</button>
          <button style={Sb.chip} onClick={()=>{ const k=kstNow(),day=k.getUTCDay(); const mon=new Date(k.getTime()-(day===0?6:day-1)*86400000); quickSet(mon.toISOString().slice(0,10),todayKST()); }}>이번 주</button>
          <button style={Sb.chip} onClick={()=>{ const k=kstNow(); quickSet(`${k.getUTCFullYear()}-${p2(k.getUTCMonth()+1)}-01`,todayKST()); }}>이번 달</button>
          <button style={Sb.chip} onClick={()=>{ const k=kstNow(),m=k.getUTCMonth(),y=k.getUTCFullYear(); const pm=m===0?12:m,py=m===0?y-1:y; const last=new Date(y,m,0).getDate(); quickSet(`${py}-${p2(pm)}-01`,`${py}-${p2(pm)}-${last}`); }}>지난 달</button>
          <button style={Sb.chip} onClick={()=>{ const k=kstNow(); quickSet(`${k.getUTCFullYear()}-01-01`,todayKST()); }}>올해 전체</button>
        </div>
      </div>
      {startDate&&endDate&&startDate<=endDate&&(
        <div style={sx({...Sb.card,textAlign:"center"})}>
          <p style={sx({fontSize:16,color:"#9ca3af",marginBottom:4})}>선택 기간 제출 건수</p>
          <p style={sx({fontSize:40,fontWeight:800,color:"#60a5fa"})}>{countRows()}<span style={sx({fontSize:18,color:"#6b7280",fontWeight:400})}> 건</span></p>
          <p style={sx({fontSize:15,color:"#6b7280",marginTop:4})}>{fmtDateFull(startDate)} ~ {fmtDateFull(endDate)}</p>
        </div>
      )}
      <div style={sx({padding:"14px 14px 0",display:"flex",flexDirection:"column",gap:10})}>
        <button style={sx({...Sb.btnGreen,opacity:downloading?0.7:1})} onClick={handleDownload} disabled={downloading}>{downloading?"⏳ 생성 중...":"⬇️ 엑셀 다운로드 (.xlsx)"}</button>
        <button style={Sb.btnSecondary} onClick={onBack}>← 대시보드로 돌아가기</button>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState("home");
  const [selTeam, setSelTeam] = useState("");
  const [selGroup, setSelGroup] = useState("");
  const [uName, setUName] = useState("");
  const [answers, setAnswers] = useState({});
  const [loading, setLoading] = useState(true);
  const [allSubs, setAllSubs] = useState({});
  const [disabled, setDisabled] = useState({});
  const [notices, setNotices] = useState({});
  const [groupNames, setGroupNames] = useState({});
  const [adminId, setAdminId] = useState("");
  const [adminPw, setAdminPw] = useState("");
  const [adminErr, setAdminErr] = useState(false);
  const [admin, setAdmin] = useState(null);
  const [dashDate, setDashDate] = useState(todayKST());
  const [showCal, setShowCal] = useState(false);
  const [filterTeam, setFilterTeam] = useState("전체");
  const [viewGroup, setViewGroup] = useState(null);
  const [noticeInput, setNoticeInput] = useState("");
  const [noticeEdit, setNoticeEdit] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [showGroupNames, setShowGroupNames] = useState(false);
  const [showTeamNames, setShowTeamNames] = useState(false);
  const [showExcel, setShowExcel] = useState(false);
  const [teamNames, setTeamNames] = useState({});

  const gName = (groupKey) => (groupNames && groupNames[groupKey]) ? groupNames[groupKey] : (groupKey || "");

  useEffect(() => {
    const u1 = db.collection("submissions").onSnapshot(snap => {
      const d={}; snap.forEach(doc=>{d[doc.id]=doc.data();}); setAllSubs(d); setLoading(false);
    }, ()=>setLoading(false));
    const u2 = db.collection("settings").doc("config").onSnapshot(snap => {
      if(snap.exists) {
        const d=snap.data();
        setDisabled(d.disabledGroups||{}); setNotices(d.customNotices||{}); setGroupNames(d.groupNames||{}); setTeamNames(d.teamNames||{});
      }
    });
    return ()=>{u1();u2();};
  }, []);

  const saveSub = async (dk, groupName, data) => { await db.collection("submissions").doc(dk).set({[groupName]:data},{merge:true}); };
  const saveGroupNames = async (newNames) => { setGroupNames(newNames); await db.collection("settings").doc("config").set({groupNames:newNames},{merge:true}); };
  const saveTeamNames = async (newNames) => { setTeamNames(newNames); await db.collection("settings").doc("config").set({teamNames:newNames},{merge:true}); };
  const tName = (teamKey) => (teamNames && teamNames[teamKey]) ? teamNames[teamKey] : (teamKey || "");

  const todayNotice = notices[todayKST()] || DEFAULT_NOTICES[getDayOfYear()%DEFAULT_NOTICES.length];
  const todaySubs = allSubs[todayKST()]||{};
  const dashSubs = allSubs[dashDate]||{};
  const activeGroups = ALL_GROUPS.filter(g=>!disabled[g]);
  const todayDone = activeGroups.filter(g=>todaySubs[g]).length;
  const totalActive = activeGroups.length;

  const handleSubmit = async () => {
    if(!uName.trim()) return alert("진행자 이름을 입력해주세요.");
    for(const q of QUESTIONS) {
      if(q.type==="yesno"&&!answers[q.id]) return alert("모든 항목을 선택해주세요.");
      if(q.type==="text"&&q.condition&&answers[q.condition.q]===q.condition.val&&!answers[q.id]?.trim()) return alert("내용을 입력해주세요.");
    }
    setSubmitting(true);
    try { await saveSub(todayKST(), selGroup, {team:selTeam,group:selGroup,name:uName.trim(),answers,time:kstTimeStr()}); setPage("submitted"); }
    catch(e) { alert("저장 실패: "+e.message); } finally { setSubmitting(false); }
  };

  const loginAdmin = () => {
    const acc=ADMIN_ACCOUNTS.find(a=>a.id===adminId&&a.password===adminPw);
    if(acc){setAdmin(acc);setAdminErr(false);setFilterTeam(acc.role==="team"?acc.team:"전체");setDashDate(todayKST());}
    else setAdminErr(true);
  };

  const toggleGroup = async g => {
    const u={...disabled,[g]:!disabled[g]}; if(!u[g]) delete u[g]; setDisabled(u);
    await db.collection("settings").doc("config").set({disabledGroups:u},{merge:true});
  };

  const qSummary = subs => {
    const r={};
    QUESTIONS.filter(q=>q.type==="yesno").forEach(q=>{r[q.id]={yes:0,no:0};});
    Object.values(subs).forEach(sub=>{
      QUESTIONS.filter(q=>q.type==="yesno").forEach(q=>{
        if(sub.answers?.[q.id]==="네") r[q.id].yes++; else if(sub.answers?.[q.id]==="아니요") r[q.id].no++;
      });
    });
    return r;
  };

  if(loading) return (
    <div style={sx({display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh"})}>
      <div style={sx({fontSize:48,marginBottom:14})}>🔄</div>
      <p style={sx({color:"#60a5fa",fontSize:18,fontWeight:600})}>데이터 불러오는 중...</p>
    </div>
  );

  if(showGroupNames && admin?.role==="super") return (<GroupNamesPage groupNames={groupNames} teamNames={teamNames} onSave={saveGroupNames} onBack={()=>setShowGroupNames(false)}/>);
  if(showTeamNames && admin?.role==="super") return (<TeamNamesPage teamNames={teamNames} onSave={saveTeamNames} onBack={()=>setShowTeamNames(false)}/>);
  if(showExcel && admin) return (<ExcelPage allSubs={allSubs} groupNames={groupNames} adminTeam={admin.team} isSuper={admin.role==="super"} onBack={()=>setShowExcel(false)}/>);

  if(page==="home") return (
    <div style={sx({paddingBottom:24})}>
      <div style={sx({background:"linear-gradient(135deg,#1a1f2e,#0d1219)",padding:"36px 24px 28px",borderBottom:"1px solid #1e2535",textAlign:"center"})}>
        <div style={sx({display:"inline-block",background:"#2563eb",color:"#fff",fontSize:14,fontWeight:700,letterSpacing:3,padding:"3px 10px",borderRadius:4,marginBottom:10})}>TBM</div>
        <h1 style={sx({fontSize:27,fontWeight:700,color:"#f0f4ff",marginBottom:4})}>오후 작업전 안전회의</h1>
        <p style={sx({fontSize:16,color:"#6b7280",letterSpacing:1})}>Tool Box Meeting</p>
      </div>
      <div style={sx({margin:"14px 14px 0",background:"linear-gradient(135deg,#1e3a5f,#162d4a)",border:"1px solid #2563eb44",borderRadius:12,padding:"12px 14px"})}>
        <div style={sx({fontSize:17,fontWeight:700,color:"#60a5fa",marginBottom:6})}>📢 오늘의 준수사항</div>
        <p style={sx({fontSize:19,color:"#bfdbfe",lineHeight:1.7})}>{todayNotice}</p>
      </div>
      <div style={Sb.card}>
        <div style={sx({display:"flex",justifyContent:"space-between",marginBottom:8})}>
          <span style={sx({fontSize:18,color:"#9ca3af"})}>오늘 제출 현황</span>
          <span style={sx({fontSize:18,fontWeight:700,color:"#60a5fa"})}>{todayDone} / {totalActive}</span>
        </div>
        <div style={sx({height:8,background:"#1e2535",borderRadius:4,overflow:"hidden"})}>
          <div style={sx({height:"100%",width:totalActive?`${(todayDone/totalActive)*100}%`:"0%",background:"linear-gradient(90deg,#2563eb,#3b82f6)",borderRadius:4,transition:"width 0.6s"})}/>
        </div>
      </div>
      <div style={sx({padding:"16px 14px 0",display:"flex",flexDirection:"column",gap:10})}>
        <button style={Sb.btnPrimary} onClick={()=>setPage("select")}>✅ 체크리스트 제출</button>
        <button style={Sb.btnSecondary} onClick={()=>setPage("admin")}>🔐 관리자 대시보드</button>
      </div>
      <p style={sx({textAlign:"center",fontSize:17,color:"#4b5563",marginTop:16})}>{kstNow().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}</p>
    </div>
  );

  if(page==="select") return (
    <div style={sx({paddingBottom:24})}>
      <div style={Sb.topBar}>
        <button style={Sb.backBtn} onClick={()=>setPage("home")}>← 뒤로</button>
        <span style={Sb.topTitle}>조 선택</span>
      </div>
      <div style={sx({padding:"16px 14px 0"})}>
        <div style={sx({fontSize:17,fontWeight:700,color:"#6b7280",marginBottom:10,letterSpacing:1})}>팀 선택</div>
        <div style={sx({display:"flex",flexWrap:"wrap",gap:7})}>
          {TEAMS.map(t=><button key={t} style={selTeam===t?Sb.chipActive:Sb.chip} onClick={()=>{setSelTeam(t);setSelGroup("");}}>{tName(t)}</button>)}
        </div>
      </div>
      {selTeam&&(
        <div style={sx({padding:"14px 14px 0"})}>
          <div style={sx({fontSize:17,fontWeight:700,color:"#6b7280",marginBottom:10,letterSpacing:1})}>조 선택</div>
          <div style={sx({display:"flex",flexWrap:"wrap",gap:7})}>
            {GROUPS[selTeam].filter(g=>!disabled[g]).map(g=>{
              const done=!!todaySubs[g];
              return <button key={g} style={done?Sb.chipDone:selGroup===g?Sb.chipActive:Sb.chip} onClick={()=>!done&&setSelGroup(g)} disabled={done}>{gName(g)} {done?"✓":""}</button>;
            })}
          </div>
        </div>
      )}
      {selGroup&&(
        <div style={sx({padding:"16px 14px 0"})}>
          <button style={Sb.btnPrimary} onClick={()=>{setAnswers({});setUName("");setPage("form");}}>{gName(selGroup)} 체크리스트 시작 →</button>
        </div>
      )}
    </div>
  );

  if(page==="form") return (
    <div style={sx({paddingBottom:40})}>
      <div style={Sb.topBar}>
        <button style={Sb.backBtn} onClick={()=>setPage("select")}>← 뒤로</button>
        <span style={Sb.topTitle}>{gName(selGroup)}</span>
      </div>
      <div style={sx({margin:"12px 14px 0",background:"linear-gradient(135deg,#1e3a5f,#162d4a)",border:"1px solid #2563eb44",borderRadius:12,padding:"12px 14px"})}>
        <div style={sx({fontSize:17,fontWeight:700,color:"#60a5fa",marginBottom:6})}>📢 오늘의 준수사항</div>
        <p style={sx({fontSize:19,color:"#bfdbfe",lineHeight:1.7})}>{todayNotice}</p>
      </div>
      <div style={Sb.card}>
        <p style={sx({fontSize:20,fontWeight:600,color:"#e8eaf0",marginBottom:8})}>진행자 이름</p>
        <input style={Sb.input} type="text" placeholder="이름을 입력하세요" value={uName} onChange={e=>setUName(e.target.value)}/>
      </div>
      {QUESTIONS.map(q=>{
        if(q.condition&&answers[q.condition.q]!==q.condition.val) return null;
        return (
          <div key={q.id} style={Sb.card}>
            <p style={sx({fontSize:20,fontWeight:600,color:"#e8eaf0",lineHeight:1.7,marginBottom:q.note?4:0})}>Q{q.id}. {q.text}</p>
            {q.note&&<p style={sx({fontSize:17,color:"#6b7280",marginBottom:8})}>※ {q.note}</p>}
            {q.type==="yesno"&&(
              <div style={sx({display:"flex",gap:8,marginTop:10})}>
                {["네","아니요"].map(opt=><button key={opt} style={answers[q.id]===opt?Sb.radioActive:Sb.radio} onClick={()=>setAnswers(p=>{const next={...p,[q.id]:opt}; if(q.id===5&&opt!=="네") delete next["5-1"]; return next;})}>{opt}</button>)}
              </div>
            )}
            {q.type==="text"&&(
              <textarea style={sx({...Sb.textarea,marginTop:8})} placeholder="내용을 입력하세요" value={answers[q.id]||""} onChange={e=>setAnswers(p=>({...p,[q.id]:e.target.value}))}/>
            )}
          </div>
        );
      })}
      <div style={sx({padding:"16px 14px 0"})}>
        <button style={sx({...Sb.btnPrimary,opacity:submitting?0.7:1})} onClick={handleSubmit} disabled={submitting}>{submitting?"저장 중...":"제출하기"}</button>
      </div>
    </div>
  );

  if(page==="submitted") return (
    <div style={sx({display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",textAlign:"center",padding:"0 20px"})}>
      <div style={sx({fontSize:72,marginBottom:14})}>✅</div>
      <h2 style={sx({fontSize:28,fontWeight:700,color:"#f0f4ff",marginBottom:8})}>제출 완료!</h2>
      <p style={sx({fontSize:21,color:"#60a5fa",marginBottom:4})}>{gName(selGroup)}</p>
      <p style={sx({fontSize:16,color:"#6b7280"})}>{kstTimeStr()} 제출</p>
      <button style={sx({...Sb.btnPrimary,marginTop:28})} onClick={()=>{setSelTeam("");setSelGroup("");setUName("");setPage("home");}}>홈으로 돌아가기</button>
    </div>
  );

  if(page==="admin"&&!admin) return (
    <div style={sx({paddingBottom:24})}>
      <div style={Sb.topBar}>
        <button style={Sb.backBtn} onClick={()=>setPage("home")}>← 뒤로</button>
        <span style={Sb.topTitle}>관리자 로그인</span>
      </div>
      <div style={sx({...Sb.card,display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center"})}>
        <div style={sx({fontSize:48,marginBottom:8})}>🔐</div>
        <p style={sx({fontSize:16,color:"#6b7280",marginBottom:16})}>관리자 ID와 비밀번호를 입력하세요</p>
        <input style={Sb.input} type="text" placeholder="관리자 ID" value={adminId} onChange={e=>setAdminId(e.target.value)}/>
        <input style={Sb.input} type="password" placeholder="비밀번호" value={adminPw} onChange={e=>setAdminPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&loginAdmin()}/>
        {adminErr&&<p style={sx({color:"#ff4d4d",fontSize:16,marginBottom:8})}>ID 또는 비밀번호가 올바르지 않습니다.</p>}
        <button style={Sb.btnPrimary} onClick={loginAdmin}>로그인</button>
      </div>
    </div>
  );

  if(viewGroup&&admin) {
    const sub = dashSubs[viewGroup];
    return (
      <div style={sx({paddingBottom:40})}>
        <div style={Sb.topBar}>
          <button style={Sb.backBtn} onClick={()=>setViewGroup(null)}>← 뒤로</button>
          <span style={Sb.topTitle}>{gName(viewGroup)} 점검결과</span>
        </div>
        {sub ? (
          <div>
            <div style={Sb.card}>
              <p style={sx({fontSize:16,color:"#6b7280",marginBottom:4,fontWeight:600})}>점검 및 인적사항</p>
              <p style={sx({fontSize:20,fontWeight:700,color:"#f0f4ff"})}>정·부진행자: {sub.name}</p>
              <p style={sx({fontSize:16,color:"#9ca3af",marginTop:4})}>제출 완료 시간: {sub.time}</p>
            </div>
            {QUESTIONS.map(q => {
              if(q.condition && sub.answers?.[q.condition.q] !== q.condition.val) return null;
              return (
                <div key={q.id} style={Sb.card}>
                  <p style={sx({fontSize:18,fontWeight:600,color:"#e8eaf0",lineHeight:1.6})}>Q{q.id}. {q.text}</p>
                  <div style={sx({marginTop:10,padding:"10px 14px",background:"#0f1117",borderRadius:8,border:"1px solid #1e2535"})}>
                    <span style={sx({fontSize:18,fontWeight:700,color: sub.answers?.[q.id]==="네"?"#4ade80":sub.answers?.[q.id]==="아니요"?"#f87171":"#60a5fa"})}>
                      {sub.answers?.[q.id] || "(미입력 공란)"}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          <div style={sx({...Sb.card,textAlign:"center",padding:"40px 0"})}>
            <p style={sx({color:"#9ca3af",fontSize:18})}>선택한 날짜에 제출된 점검 데이터가 존재하지 않습니다.</p>
          </div>
        )}
        <div style={sx({padding:"14px 14px 0"})}>
          <button style={Sb.btnSecondary} onClick={()=>setViewGroup(null)}>목록으로 돌아가기</button>
        </div>
      </div>
    );
  }

  if(page==="admin" && admin) {
    const summary = qSummary(dashSubs);
    const filteredGroups = ALL_GROUPS.filter(g => !disabled[g] && (filterTeam === "전체" || g.startsWith(filterTeam)));

    const handleSaveNotice = async () => {
      const nextNotices = { ...notices, [dashDate]: noticeInput };
      try {
        await db.collection("settings").doc("config").set({ customNotices: nextNotices }, { merge: true });
        setNoticeEdit(false);
      } catch(e) {
        alert("공지사항 업데이트 실패: " + e.message);
      }
    };

    return (
      <div style={sx({paddingBottom:40})}>
        {showCal && <CalendarPicker value={dashDate} onChange={v=>{setDashDate(v); setShowCal(false);}} onClose={()=>setShowCal(false)} />}
        <div style={Sb.topBar}>
          <button style={Sb.backBtn} onClick={()=>{setAdmin(null); setPage("home");}}>← 로그아웃</button>
          <span style={Sb.topTitle}>관리자 대시보드</span>
          <span style={admin.role==="super"?Sb.badgeSuper:Sb.badgeTeam}>{admin.label}</span>
        </div>
        <div style={Sb.card}>
          <div style={sx({display:"flex",alignItems:"center",justifyContent:"space-between"})}>
            <span style={sx({fontSize:18,fontWeight:700,color:"#f0f4ff"})}>{fmtDateFull(dashDate)} 현황</span>
            <button style={Sb.smallBtn} onClick={()=>setShowCal(true)}>📅 날짜 조회변경</button>
          </div>
        </div>
        <div style={Sb.card}>
          <div style={sx({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8})}>
            <span style={sx({fontSize:16,fontWeight:700,color:"#60a5fa"})}>📢 선택일 현장 안전준수사항 고지</span>
            {!noticeEdit && <button style={Sb.smallBtn} onClick={()=>{setNoticeInput(notices[dashDate]||""); setNoticeEdit(true);}}>수정/등록</button>}
          </div>
          {noticeEdit ? (
            <div>
              <textarea style={Sb.textarea} value={noticeInput} onChange={e=>setNoticeInput(e.target.value)} placeholder="금일 작업 환경에 맞는 일일 안전지침을 직접 하달하세요..." />
              <div style={sx({display:"flex",gap:6,marginTop:8})}>
                <button style={sx({...Sb.smallBtn,background:"#2563eb",color:"#fff",flex:1})} onClick={handleSaveNotice}>서버 전송</button>
                <button style={sx({...Sb.smallBtn,flex:1})} onClick={()=>setNoticeEdit(false)}>취소</button>
              </div>
            </div>
          ) : (
            <p style={sx({fontSize:17,color:"#bfdbfe",lineHeight:1.6})}>{notices[dashDate] || "(지정된 커스텀 공지가 없어 365일 기본 순환 공지사항이 자동 노출됩니다)"}</p>
          )}
        </div>
        {admin.role === "super" && (
          <div style={sx({padding:"14px 14px 0"})}>
            <div style={sx({fontSize:15,fontWeight:700,color:"#6b7280",marginBottom:8})}>소속 팀 대시보드 필터</div>
            <div style={sx({display:"flex",flexWrap:"wrap",gap:6})}>
              {["전체", ...TEAMS].map(t => (
                <button key={t} style={filterTeam===t?Sb.chipActive:Sb.chip} onClick={()=>setFilterTeam(t)}>
                  {t === "전체" ? "전체 보기" : tName(t)}
                </button>
              ))}
            </div>
          </div>
        )}
        <div style={Sb.card}>
          <p style={sx({fontSize:18,fontWeight:700,color:"#f0f4ff",marginBottom:12})}>조별 TBM 이행 현황 ({filteredGroups.filter(g=>dashSubs[g]).length}/{filteredGroups.length})</p>
          <div style={sx({display:"flex",flexDirection:"column",gap:8})}>
            {filteredGroups.map(g => {
              const sub = dashSubs[g];
              return (
                <div key={g} style={sx({display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:"#0f1117",borderRadius:8,border:"1px solid #1e2535"})}>
                  <div>
                    <span style={sx({fontSize:17,fontWeight:600,color:"#e8eaf0"})}>{gName(g)}</span>
                    {sub && <span style={sx({fontSize:14,color:"#6b7280",marginLeft:8})}>{sub.name} ({sub.time})</span>}
                  </div>
                  {sub ? (
                    <button style={sx({...Sb.smallBtn,background:"#1e3a5f",color:"#60a5fa",border:"1px solid #2563eb44"})} onClick={()=>setViewGroup(g)}>결과상세</button>
                  ) : (
                    <span style={sx({fontSize:15,color:"#f87171",fontWeight:600,padding:"4px 8px"})}>미제출</span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
        <div style={Sb.card}>
          <p style={sx({fontSize:18,fontWeight:700,color:"#f0f4ff",marginBottom:12})}>📊 주요 점검항목별 이행(네) 건수</p>
          <BarChart data={QUESTIONS.filter(q=>q.type==="yesno").map(q=>({
            label: `Q${q.id}`,
            val: summary[q.id]?.yes || 0,
            color: "#2563eb"
          }))} maxVal={filteredGroups.length || 1} />
        </div>
        {admin.role === "super" && (
          <div style={sx({padding:"14px 14px 0",display:"flex",gap:8})}>
            <button style={sx({...Sb.btnSecondary,flex:1,fontSize:16,padding:12})} onClick={()=>setShowTeamNames(true)}>✏️ 전체 팀명 커스텀</button>
            <button style={sx({...Sb.btnSecondary,flex:1,fontSize:16,padding:12})} onClick={()=>setShowGroupNames(true)}>✏️ 전체 조명 커스텀</button>
          </div>
        )}
        <div style={sx({padding:"12px 14px 0"})}>
          <button style={Sb.btnGreen} onClick={()=>setShowExcel(true)}>📊 증빙용 엑셀 내보내기 (.xlsx)</button>
        </div>
      </div>
    );
  }

  return (
    <div style={sx({textAlign:"center",padding:40})}>
      <p style={sx({fontSize:18,color:"#9ca3af"})}>비정상적인 접근 경로입니다.</p>
      <button style={sx({...Sb.btnPrimary,marginTop:20})} onClick={()=>setPage("home")}>안전회의 메인으로</button>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error: null}; }
  static getDerivedStateFromError(e) { return {error: e}; }
  render() {
    if(this.state.error) return (
      <div style={sx({padding:30,color:"#f87171",fontFamily:"sans-serif",textAlign:"center",paddingTop:80})}>
        <div style={sx({fontSize:48,marginBottom:16})}>⚠️</div>
        <p style={sx({fontSize:18,fontWeight:700,marginBottom:12})}>오류가 발생했어요</p>
        <p style={sx({fontSize:14,color:"#9ca3af",marginBottom:24})}>{""+this.state.error}</p>
        <button style={sx({padding:"12px 24px",background:"#2563eb",color:"#fff",border:"none",borderRadius:8,fontSize:16,cursor:"pointer"})} onClick={()=>window.location.reload()}>새로고침</button>
      </div>
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister();});});
}
if(window.caches){caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});});}
</script>
</body>
</html>
